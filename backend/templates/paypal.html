{% extends 'base.html' %}
{% block title %}Pago PayPal{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <h2>Pagar Pedido #{{ pedido_id }}</h2>
    <h3 class="text-success">Total: ${{ total }}</h3>

    <div id="paypal-button-container" class="mt-4"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=Afba0PKSXZrHx0ClCFBL0Roy_x0uAcfE3j2r8WC-3Isd4VcXbfnS0te2hlgmXk8KENEB5zS0ElSLLiYE&currency=USD"></script>

<script>
paypal.Buttons({
    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: '{{ total }}'
                }
            }]
        });
    },
    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            window.location.href = "/paypal-success/{{ pedido_id }}";
        });
    },
    onCancel: function (data) {
        window.location.href = "/paypal-cancel/{{ pedido_id }}";
    }
}).render('#paypal-button-container');
</script>

{% endblock %}
