<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - FERREMAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1>Panel de Administración</h1>
    
    <form method="POST" enctype="multipart/form-data" class="mb-4">
        <input type="text" name="nombre" placeholder="Nombre del producto" required class="form-control mb-2">
        <textarea name="descripcion" placeholder="Descripción del producto" required class="form-control mb-2"></textarea>
        <input type="number" name="precio" placeholder="Precio del producto" required class="form-control mb-2">
        <input type="file" name="imagen" accept="image/*" required class="form-control mb-3">
        <button type="submit" class="btn btn-primary">Agregar Producto</button>
    </form>

    <h3>Productos en stock:</h3>
    <ul class="list-group">
        {% for producto in productos %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ producto[1] }} - ${{ producto[3] }}</span>
            <form action="{{ url_for('eliminar_producto', id=producto[0]) }}" method="POST" style="margin: 0;">
                <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
